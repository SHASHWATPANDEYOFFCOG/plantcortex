name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      # Errors-only gate (syntax errors, undefined names) — style rules stay advisory
      - name: Ruff (critical rules)
        run: ruff check --select E9,F63,F7,F82 .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -e .[dev]
      # The suite is self-contained: conftest generates the seed corpus and
      # ingests it into fresh in-memory repos — no services or API keys needed.
      - name: Run tests
        run: python -m pytest
