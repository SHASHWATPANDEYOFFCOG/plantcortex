# OPTIONAL external-store path (Neo4j + Qdrant + api + web).
# This machine has no Docker; PlantCortex defaults to embedded NetworkX + Chroma.
# Provided for spec-completeness and for deployment on a Docker-capable host.
# Bring up with:  docker compose up  (then set GRAPH_BACKEND=neo4j, VECTOR_BACKEND=qdrant)
services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: neo4j/plantcortex
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: ./api
    env_file: .env
    environment:
      GRAPH_BACKEND: neo4j
      VECTOR_BACKEND: qdrant
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "8000:8000"
    depends_on: [neo4j, qdrant]

  web:
    build: ./web
    ports:
      - "3000:3000"
    depends_on: [api]

volumes:
  neo4j_data:
  qdrant_data:
