name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      # Errors-only gate (syntax errors, undefined names) — style rules stay advisory
      - name: Ruff (critical rules)
        run: ruff check --select E9,F63,F7,F82 .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -e .[dev]
      # test_api.py exercises the real app lifespan, which loads the persisted
      # graph/vector stores from data/ — build them first. Deterministic and
      # fully offline (DEMO_STRICT=1): no services or API keys needed.
      - name: Seed demo corpus (offline)
        run: python -m scripts.seed_demo
        env:
          DEMO_STRICT: "1"
      - name: Run tests
        run: python -m pytest
